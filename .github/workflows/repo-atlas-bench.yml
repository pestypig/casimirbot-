name: Repo Atlas Benchmark

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  atlas-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build repo atlas
        run: npm run atlas:build

      - name: Run repo-wide atlas benchmark sample gate
        run: npm run atlas:bench:ci

      - name: Upload atlas benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-atlas-bench
          path: artifacts/repo-atlas/atlas-bench.v1.json
          if-no-files-found: error
